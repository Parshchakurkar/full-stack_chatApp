name: Backend_Build_$(Build.SourceBranchName)_01.00.00.$(rev:.rrrr)

trigger:
  branches:
    include:
      - main
      - release/*
      - develop/*
    exclude:
      - docs/*
  paths:
    include:
      - backend/**
      - pipeline/backend.build.yml

pr:
  - main
  - develop/*
  - release/*

variables:
  - template: /pipeline/variables/variables.yml
  - name: backendimageTag
    value: $(Build.BuildId)
  

pool:
  vmImage: ubuntu-latest

stages:
  - stage: GetBuildVersion
    displayName: GetBuildVersion
    jobs: 
      - job: GetBuildVersion
        displayName: Get Build Version
        steps:
          - checkout: none
          - task: PowerShell@2
            displayName: get version
            inputs:
              targetType: 'inline'
              script: |
                $versionData = [regex]::matches('$(Build.BuildNumber)', '(\d+\.\d+\.\d+)').value -replace '\b0(\d)', '$1'
                Write-Host "##vso[task.setvariable variable=version;isOutput=true]$versionData"
            name: GetVersion

  - stage: SecurityScan
    displayName: Security Scanning
    dependsOn: GetBuildVersion
    condition: succeeded()
    variables:
      Version: $[stageDependencies.GetBuildVersion.GetBuildVersion.outputs['GetVersion.version']]
    jobs:
      - job: SnykSourceScan
        displayName: Snyk Source Scan
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)
          - task: Npm@1
            displayName: Install dependencies
            inputs:
              command: 'ci'
              workingDir: 'backend'

          - task: SnykSecurityScan@1
            displayName: Scan Open source
            inputs:
              serviceConnectionEndpoint: 'snyk-connection'
              testType: 'app'
              monitorWhen: 'always'
              failOnIssues: false
              organization: '$(snykOrg)'
              additionalArguments: '--all-projects --target-reference=$(snykProjectNamebackend) --tags=Version=Backend_v$(Version),branch=$(Build.SourceBranch) --exclude=frontend,terraform,kubernetes'
              failOnThreshold: 'high'

      - job: StaticCodescan
        displayName: Static code scan
        steps:
          - checkout: self
          
          - task: SnykSecurityScan@1
            displayName: Scan Static code
            inputs:
              serviceConnectionEndpoint: 'snyk-connection'
              testType: 'code'
              failOnIssues: false
              organization: '$(snykOrg)'
              failOnThreshold: 'high'
              additionalArguments: '--all-projects --sarif-file-output=$(Build.SourcesDirectory)/code/report.sarif'
          
          - task: PowerShell@2
            displayName: ConverttoHtml
            condition: succeededOrFailed()
            inputs:
              targetType: 'inline'
              script: |
                if (-not (Get-Command snyk-to-html -ErrorAction SilentlyContinue)) { 
                  npm install -g snyk-to-html 
                }
                snyk-to-html -i "$(Build.SourcesDirectory)/code/report.sarif" -o "$(Build.SourcesDirectory)/code/report.html"
          
          - task: PublishBuildArtifacts@1
            displayName: publish analysis
            inputs:
              PathtoPublish: '$(Build.SourcesDirectory)/code/report.html'
              ArtifactName: 'backendcode Analysis'
              publishLocation: 'Container'


