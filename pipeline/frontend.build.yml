name: Frontend_Build_$(Build.SourceBranchName)_01.00.00.$(rev:.rrrr)

trigger:
  branches:
    include:
      - main
      - release/*
      - develop
    exclude:
      - docs/*
  paths:
    include:
      - frontend/**
      - pipeline/frontend.build.yml

pr:
  - main
  - develop
  - release/*

variables:
  - template: /pipeline/variables/variables.yml
  

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: CodevalidationandBuild
        displayName: Code Quality Validation and Build
        steps:
          - checkout: self
          
          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)
          
          - task: Npm@1
            displayName: Install dependencies
            inputs:
              command: 'ci'
              workingDir: 'frontend'

          - script: |
              cd frontend
              npm run lint
            displayName: Run ESLint
            continueOnError: true
          
          - task: Npm@1
            displayName: NPM Build
            inputs:
              command: 'custom'
              workingDir: 'frontend'
              customCommand: 'run build'

          - task: PublishBuildArtifacts@1
            displayName: Publish build artifacts
            inputs:
              pathToPublish: frontend/dist
              artifactName: frontend-dist-$(Build.BuildId)

      - job: GetBuildVersion
        displayName: Get Build Version
        steps:
          - checkout: none
          - task: PowerShell@2
            displayName: get version
            inputs:
              targetType: 'inline'
              script: |
                $versionData = [regex]::matches('$(Build.BuildNumber)', '(\d+\.\d+\.\d+)').value -replace '\b0(\d)', '$1'
                Write-Host "##vso[task.setvariable variable=version;isOutput=true]$versionData"
            name: GetVersion

  - stage: SecurityScan
    displayName: Security Scanning
    dependsOn: Build
    condition: succeeded()
    variables:
      Version: $[stageDependencies.Build.GetBuildVersion.outputs['GetVersion.version']]
    jobs:
      - job: SnykSourceScan
        displayName: Snyk Source Scan
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)
          - task: SnykSecurityScan@1
            displayName: Scan Open source
            inputs:
              serviceConnectionEndpoint: 'snyk-connection'
              testType: 'app'
              targetFile: 'frontend'
              severityThreshold: 'medium'
              monitorWhen: 'always'
              failOnIssues: true
              organization: '$(snykOrg)'
              additionalArguments: '--all-projects --target-reference=$(snykProjectName) --tags=Version=FrontEnd_v$(Version),branch=$(Build.SourceBranch) --exclude=backend,terraform,kubernetes'
      
      - job: StaticCodescan
        displayName: Static code scan
        steps:
          - checkout: self
          - task: SnykSecurityScan@1
            displayName: Scan Static code
            inputs:
              serviceConnectionEndpoint: 'snyk-connection'
              testType: 'code'
              failOnIssues: false
              organization: '$(snykOrg)'
              failOnThreshold: 'high'
              additionalArguments: '--all-projects --sarif-file-output=$(Build.ArtifactStagingDirectory)/code/report.sarif'
          
          - task: PowerShell@2
            displayName: Convert to html
            inputs:
              targetType: 'inline'
              script: |
                if(-not (Get-Command snyk-to-html -ErrorAction SilentlyContinue)) { 
                    npm install -g snyk-to-html 
                }
                snyk-to-html -i 'report.sarif' -o 'report.html'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/code/report.html'
              ArtifactName: 'frontendcode Analysis'
              publishLocation: 'Container'


