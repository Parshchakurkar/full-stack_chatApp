apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-statefulset
  labels: 
    app: DB
  namespace: mongodb
spec:
  replicas: 1
  serviceName: mongodb-clusterip-service
  selector: 
    matchLabels:
      app: DB
  template:
    metadata:
      labels:
        app: DB
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        env:
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:              # ✅ Fix 1: was "seccretKeyRef"
              name: mongodb-secret
              key: MONGO_INITDB_ROOT_PASSWORD
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            configMapKeyRef:
              key: MONGO_INITDB_ROOT_USERNAME
              name: mongodb-configmap
        volumeMounts:
          - name: mongodb-storage
            mountPath: /data/db
        ports: 
        - containerPort: 27017
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:                         # ✅ Fix 2: moved out of containers, sibling of containers
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: pvc-azure-disk