apiVersion: apps/v1
kind: Deployment
metadata:
  name: backened-deployment
  labels:
    app: backend
  namespace: backend-namespace

spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: chatappacr123.azurecr.io/chatapp-backend:1.0.0.10
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: MONGODB_URI
              value: "mongodb://root:admin@mongodb-clusterip-service.mongodb.svc.cluster.local:27017/chatApp?authSource=admin"

            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: jwt-secret
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
    tolerations:
      - key: "node-role.kubernetes.io/master"
        effect: "NoSchedule"


# "mongodb://root:admin@mongodb.mongodb:27017/chatApp?authSource=admin" after admin added monogodb as DB is in different namespace
# In Kubernetes, services are discovered using internal DNS names.
# Default format : service-name.namespace.svc.cluster.local
#If MongoDB is deployed in another namespace (for example database), then you must specify the namespace.
#mongodb://root:admin@<svc>.<namespace>.svc.cluster.local:27017/chatApp?authSource=admin
#Example:

#mongodb.<namespace>:27017